version: '3.8'

services:
  api:
    build: .
    container_name: production-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://production_user:production_pass@db:5432/production_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

  streamlit:
    build: .
    container_name: production-dashboard
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://production_user:production_pass@db:5432/production_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: streamlit run src/visualization/dashboard.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - .:/app

  db:
    image: postgres:15-alpine
    container_name: production-db
    environment:
      POSTGRES_USER: production_user
      POSTGRES_PASSWORD: production_pass
      POSTGRES_DB: production_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U production_user -d production_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: production-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: